services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_PUSH_ENDPOINT: ${VITE_PUSH_ENDPOINT}
        APP_VERSION: ${APP_VERSION:-dev}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
