<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F3EC"/>
      <stop offset="100%" stop-color="#EDE6D8"/>
    </linearGradient>
  </defs>
  <!-- Full background for maskable safe area -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <!-- Stacked cards centered in safe zone (~66% = 338px, so scale down) -->
  <g transform="translate(64, 48) scale(0.75)">
    <!-- Back card -->
    <rect x="96" y="120" width="280" height="240" rx="32" fill="#fff" stroke="#1A1714" stroke-width="10"/>
    <!-- Middle card -->
    <rect x="136" y="152" width="280" height="240" rx="32" fill="#C75B39" stroke="#1A1714" stroke-width="10"/>
    <!-- Front card -->
    <rect x="176" y="184" width="280" height="240" rx="32" fill="#F7F3EC" stroke="#1A1714" stroke-width="10"/>
    <!-- Sparkle on center card -->
    <text x="316" y="340" text-anchor="middle" font-size="120" fill="#F7F3EC" font-weight="700" font-family="serif">✦</text>
  </g>
</svg>
