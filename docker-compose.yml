services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${DEV_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env

  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    ports:
      - "${PROD_PORT:-8080}:80"
    env_file:
      - .env
